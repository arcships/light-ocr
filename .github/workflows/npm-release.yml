name: npm release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Core and stable Small facade version
        required: true
        default: 0.4.0
        type: string
      publish_to_registry:
        description: Publish the tested candidate to npm under next
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: npm-release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
      - name: Validate release identity
        shell: bash
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          test "${GITHUB_REF}" = "refs/heads/main"
          [[ "${RELEASE_VERSION}" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]
          source_version="$(node -p "require('./packages/light-ocr/package.json').version")"
          test "$RELEASE_VERSION" = "$source_version"
          python tools/npm_release.py ensure-unpublished --version "$RELEASE_VERSION"

  build-native:
    needs: validate
    name: build ${{ matrix.id }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: macos-arm64
            runner: macos-15
            runtime_flavor: cpu
          - id: macos-x64
            runner: macos-15-intel
            runtime_flavor: cpu
          - id: linux-x64
            runner: ubuntu-24.04
            runtime_flavor: webgpu
          - id: linux-arm64
            runner: ubuntu-24.04-arm
            runtime_flavor: cpu
          - id: windows-x64
            runner: windows-2022
            runtime_flavor: webgpu
            cmake_arch: x64
          - id: windows-arm64
            runner: windows-11-arm
            runtime_flavor: cpu
            cmake_arch: ARM64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - name: Bootstrap pinned native dependencies
        shell: bash
        run: python tools/bootstrap_dependencies.py --cache-dir .cache/dependencies
      - name: Assemble the locked WebGPU SDK
        if: matrix.runtime_flavor == 'webgpu'
        shell: bash
        run: >-
          python tools/webgpu/build_runtime.py
          --platform "${{ matrix.id }}"
          --package-cache .cache/webgpu-packages
          --output-dir "dist/webgpu-sdk/${{ matrix.id }}"
      - name: Install Node development files (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          node_version="$(node -p process.versions.node)"
          npx --yes node-gyp@11.4.2 install "$node_version" --devdir "$PWD/.cache/node-gyp"
          echo "NODE_INCLUDE_DIR=$PWD/.cache/node-gyp/$node_version/include/node" >> "$GITHUB_ENV"
      - name: Install Node development files (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $nodeVersion = node -p process.versions.node
          $devDir = Join-Path $env:GITHUB_WORKSPACE ".cache/node-gyp"
          npx --yes node-gyp@11.4.2 install $nodeVersion --devdir $devDir
          $nodeRoot = Join-Path $devDir $nodeVersion
          $nodeLibrary = Get-ChildItem $nodeRoot -Recurse -Filter node.lib | Select-Object -First 1
          "NODE_INCLUDE_DIR=$(Join-Path $nodeRoot 'include/node')" | Out-File -FilePath $env:GITHUB_ENV -Append
          "NODE_LIBRARY=$($nodeLibrary.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
      - name: Configure native package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: >-
          cmake -S . -B build-npm -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DLIGHT_OCR_DEPENDENCY_CACHE_DIR="$PWD/.cache/dependencies"
          -DLIGHT_OCR_ONNXRUNTIME_FLAVOR=${{ matrix.runtime_flavor }}
          -DLIGHT_OCR_WEBGPU_SDK_DIR="$PWD/dist/webgpu-sdk/${{ matrix.id }}"
          -DLIGHT_OCR_BUILD_NODE=ON
          -DLIGHT_OCR_BUILD_TESTS=OFF
          -DLIGHT_OCR_BUILD_TOOLS=OFF
          -DLIGHT_OCR_NODE_INCLUDE_DIR="$NODE_INCLUDE_DIR"
          -DLIGHT_OCR_NODE_EXECUTABLE="$(command -v node)"
      - name: Configure native package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: >-
          cmake -S . -B build-npm -G "Visual Studio 17 2022" -A ${{ matrix.cmake_arch }}
          "-DLIGHT_OCR_DEPENDENCY_CACHE_DIR=$env:GITHUB_WORKSPACE/.cache/dependencies"
          -DLIGHT_OCR_ONNXRUNTIME_FLAVOR=${{ matrix.runtime_flavor }}
          "-DLIGHT_OCR_WEBGPU_SDK_DIR=$env:GITHUB_WORKSPACE/dist/webgpu-sdk/${{ matrix.id }}"
          -DLIGHT_OCR_BUILD_NODE=ON
          -DLIGHT_OCR_BUILD_TESTS=OFF
          -DLIGHT_OCR_BUILD_TOOLS=OFF
          "-DLIGHT_OCR_NODE_INCLUDE_DIR=$env:NODE_INCLUDE_DIR"
          "-DLIGHT_OCR_NODE_LIBRARY=$env:NODE_LIBRARY"
          "-DLIGHT_OCR_NODE_EXECUTABLE=$((Get-Command node).Source)"
      - name: Build the addon and release metadata
        shell: bash
        run: |
          cmake --build build-npm --config Release --parallel
          python tools/generate_release_metadata.py \
            --build-dir build-npm \
            --output-dir "reports/npm/${{ matrix.id }}" \
            --platform-id "${{ matrix.id }}" \
            --configuration Release \
            --model-free
      - name: Stage native package input
        shell: bash
        run: >-
          python tools/npm_release.py stage-native
          --platform-id "${{ matrix.id }}"
          --build-dir build-npm
          --configuration Release
          --metadata-dir "reports/npm/${{ matrix.id }}"
          --output-dir "dist/native-input/${{ matrix.id }}"
          --runtime-flavor "${{ matrix.runtime_flavor }}"
          --webgpu-artifact-manifest
          "dist/webgpu-sdk/${{ matrix.id }}/artifact-manifest.json"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: native-${{ matrix.id }}
          path: dist/native-input/${{ matrix.id }}
          if-no-files-found: error
          retention-days: 30

  assemble:
    needs: build-native
    runs-on: ubuntu-24.04
    env:
      RELEASE_VERSION: ${{ inputs.version }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - run: npm install --global npm@11.0.0
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          pattern: native-*
          path: dist/native-input
      - name: Build the two locked preview model bundles once
        shell: bash
        run: |
          python tools/bootstrap_models.py --tier tiny --cache-dir .cache/models
          python tools/bootstrap_models.py --tier medium --cache-dir .cache/models
      - name: Assemble and pack the independent package set
        shell: bash
        run: |
          python tools/npm_release.py assemble \
            --version "$RELEASE_VERSION" \
            --tiny-bundle models/generated/ppocrv6-tiny-onnx-20260722.1 \
            --medium-bundle models/generated/ppocrv6-medium-onnx-20260722.1 \
            --native-root dist/native-input \
            --output-dir dist/npm/staging
          python tools/npm_release.py pack \
            --staging-dir dist/npm/staging \
            --output-dir dist/npm/tarballs
          npm pack --ignore-scripts --pack-destination dist/npm/tarballs \
            @arcships/light-ocr-model-ppocrv6-small@0.3.4
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: light-ocr-npm-${{ inputs.version }}
          path: |
            dist/npm/tarballs/*.tgz
            dist/npm/tarballs/release-manifest.json
          if-no-files-found: error
          retention-days: 90

  test-packages:
    needs: assemble
    name: smoke ${{ matrix.id }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: macos-arm64
            runner: macos-15
            native: darwin-arm64
          - id: macos-x64
            runner: macos-15-intel
            native: darwin-x64
          - id: linux-x64
            runner: ubuntu-24.04
            native: linux-x64-gnu
            preview: true
          - id: linux-arm64
            runner: ubuntu-24.04-arm
            native: linux-arm64-gnu
          - id: windows-x64
            runner: windows-2022
            native: win32-x64
          - id: windows-arm64
            runner: windows-11-arm
            native: win32-arm64
    runs-on: ${{ matrix.runner }}
    env:
      RELEASE_VERSION: ${{ inputs.version }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: light-ocr-npm-${{ inputs.version }}
          path: dist/release
      - name: Install the local stable closure without scripts or network
        shell: bash
        run: |
          mkdir package-smoke
          cd package-smoke
          npm init --yes
          npm install --offline --ignore-scripts --no-audit --no-fund --package-lock=false \
            ../dist/release/arcships-light-ocr-model-ppocrv6-small-0.3.4.tgz \
            ../dist/release/arcships-light-ocr-${{ matrix.native }}-${RELEASE_VERSION}.tgz \
            ../dist/release/arcships-light-ocr-runtime-0.1.0.tgz \
            ../dist/release/arcships-light-ocr-${RELEASE_VERSION}.tgz
          cp ../tools/npm/smoke.cjs .
      - name: Run stable Small OCR
        shell: bash
        working-directory: package-smoke
        env:
          LIGHT_OCR_SMOKE_FIXTURE: ${{ github.workspace }}/corpus/fixtures/generated-hello-123
        run: node smoke.cjs
      - name: Install and smoke preview tiers
        if: matrix.preview
        shell: bash
        working-directory: package-smoke
        env:
          LIGHT_OCR_SMOKE_FIXTURE: ${{ github.workspace }}/corpus/fixtures/generated-hello-123
        run: |
          npm install --offline --ignore-scripts --no-audit --no-fund --package-lock=false \
            ../dist/release/arcships-light-ocr-model-ppocrv6-tiny-0.1.0.tgz \
            ../dist/release/arcships-light-ocr-model-ppocrv6-medium-0.1.0.tgz \
            ../dist/release/arcships-light-ocr-tiny-0.1.0.tgz \
            ../dist/release/arcships-light-ocr-medium-0.1.0.tgz
          node ../tools/npm/smoke-tier.cjs @arcships/light-ocr-tiny light-ocr-tiny \
            ppocrv6-tiny-onnx-20260722.1
          node ../tools/npm/smoke-tier.cjs @arcships/light-ocr-medium light-ocr-medium \
            ppocrv6-medium-onnx-20260722.1

  publish:
    needs: test-packages
    if: inputs.publish_to_registry
    runs-on: ubuntu-24.04
    environment: npm-release
    permissions:
      contents: read
      id-token: write
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      RELEASE_VERSION: ${{ inputs.version }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org
      - run: npm install --global npm@11.0.0
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: light-ocr-npm-${{ inputs.version }}
          path: dist/release
      - name: Publish native, runtime, and preview models to next
        run: >-
          python tools/npm_release.py publish
          --tarball-dir dist/release
          --phase dependencies
          --tag next
      - name: Resolve the stable facade against npm
        shell: bash
        run: |
          mkdir registry-preflight
          cd registry-preflight
          npm init --yes
          npm install --ignore-scripts --no-audit --no-fund --package-lock=false \
            ../dist/release/arcships-light-ocr-${RELEASE_VERSION}.tgz
      - name: Publish all facades to next
        run: >-
          python tools/npm_release.py publish
          --tarball-dir dist/release
          --phase facade
          --tag next
      - name: Verify the published stable package offline
        shell: bash
        run: |
          mkdir registry-final
          cd registry-final
          npm init --yes
          npm install --ignore-scripts --no-audit --no-fund --package-lock=false \
            "@arcships/light-ocr@${RELEASE_VERSION}"
          cp ../tools/npm/smoke.cjs .
          sudo unshare --net -- env \
            LIGHT_OCR_SMOKE_FIXTURE="$GITHUB_WORKSPACE/corpus/fixtures/generated-hello-123" \
            node smoke.cjs
